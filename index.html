<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR เกมจับผิดรูปภาพ & โครงร่างร่างกาย</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- MediaPipe Holistic Library -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Kanit', sans-serif; 
            background-color: #2f3542;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 { margin: 10px 0; font-size: 28px; color: #7bed9f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        p { margin: 0 0 20px 0; font-size: 16px; color: #ced6e0; }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #fff;
        }

        #webcam { display: none; }
        
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
            text-align: center;
            background: rgba(255,255,255,0.9);
            padding: 20px 40px;
            border-radius: 30px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>🏃‍♂️ AR เกมจับผิดรูปภาพ (ใช้มือสัมผัส)</h1>
    <p>ขยับร่างกายให้อยู่ในกล้อง และใช้ "ปลายนิ้วชี้" แตะค้างที่รูปที่ไม่เข้าพวก!</p>

    <div id="gameContainer">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="800" height="600"></canvas>
        <div id="loading">กำลังโหลด AI กล้องจับการเคลื่อนไหว...<br><span style="font-size:16px; color:#57606f;">โปรดรอสักครู่และอนุญาตการเข้าถึงกล้อง</span></div>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingScreen = document.getElementById('loading');

    // ============ Game Data ============
    let score = 0;
    let round = 1;
    let lives = 3;
    let gridItems = []; 
    let hoverTarget = null; 
    let hoverProgress = 0; 
    let isTransitioning = false; 

    const pairs = [
        ['🍎','🍅'], ['🐶','🐻'], ['☀️','⭐'], 
        ['🚗','🚕'], ['⚽','🏀'], ['🍉','🍓']
    ];

    function generateLevel() {
        gridItems = [];
        let gridSize = round <= 2 ? 2 : (round <= 5 ? 3 : 4); 
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let oddIndex = Math.floor(Math.random() * (gridSize * gridSize));

        let cellW = canvasElement.width / gridSize;
        let cellH = canvasElement.height / gridSize;

        for (let row = 0; row < gridSize; row++) {
            for (let col = 0; col < gridSize; col++) {
                let i = row * gridSize + col;
                let isOdd = (i === oddIndex);
                let text = isOdd ? pair[1] : pair[0];
                
                let cx = (col * cellW) + (cellW / 2);
                let cy = (row * cellH) + (cellH / 2);

                gridItems.push({
                    x: cx, y: cy,
                    radius: Math.min(cellW, cellH) * 0.35,
                    text: text,
                    isOdd: isOdd
                });
            }
        }
    }

    // ============ AI & MediaPipe ============
    const holistic = new Holistic({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
    }});
    holistic.setOptions({
        modelComplexity: 1, 
        smoothLandmarks: true,
        enableSegmentation: false,
        refineFaceLandmarks: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    holistic.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await holistic.send({image: videoElement});
        },
        width: 800,
        height: 600
    });
    camera.start();

    function onResults(results) {
        if(loadingScreen.style.display !== 'none') {
            loadingScreen.style.display = 'none';
            generateLevel(); 
        }

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // 1. วาดภาพกล้องแบบกระจก
        canvasCtx.scale(-1, 1);
        canvasCtx.translate(-canvasElement.width, 0);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        // 2. วาดโครงร่างร่างกาย (Pose) ทั้งตัว เตรียมไว้สำหรับทำท่าออกกำลังกาย
        if (results.poseLandmarks) {
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#44bd32', lineWidth: 4}); // เส้นสีเขียว
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#fbc531', lineWidth: 2, radius: 3}); // จุดข้อต่อสีเหลือง
        }

        // 3. วาดโครงร่างมือ (เพื่อให้เห็นชัดเจนเวลากำมือกางมือ)
        if (results.rightHandLandmarks) {
            drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#00CCFF', lineWidth: 3});
        } 
        if (results.leftHandLandmarks) {
            drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#00CCFF', lineWidth: 3});
        }

        canvasCtx.restore(); // คืนค่าแกนพิกัดกลับมาเป็นปกติ

        // --- ดึงพิกัด "ปลายนิ้วชี้" แค่มือเดียว (เลือกรองรับขวาก่อนซ้าย) สำหรับเล่นเกม ---
        let activeFinger = null;
        const getMirroredCoords = (landmark) => {
            return {
                x: (1 - landmark.x) * canvasElement.width,
                y: landmark.y * canvasElement.height
            };
        };

        if (results.rightHandLandmarks) {
            activeFinger = getMirroredCoords(results.rightHandLandmarks[8]); // นิ้วชี้ขวา
        } else if (results.leftHandLandmarks) {
            activeFinger = getMirroredCoords(results.leftHandLandmarks[8]); // นิ้วชี้ซ้าย
        } else if (results.poseLandmarks) {
            // สำรองกรณีเห็นแต่แขนจากระยะไกล
            if (results.poseLandmarks[20].visibility > 0.5) {
                activeFinger = getMirroredCoords(results.poseLandmarks[20]);
            } else if (results.poseLandmarks[19].visibility > 0.5) {
                activeFinger = getMirroredCoords(results.poseLandmarks[19]);
            }
        }

        drawGameUI();

        if (lives <= 0) {
            drawGameOver();
            return;
        }

        if (isTransitioning) return;

        let currentHover = null;

        // วาดรูปภาพ (ปรับสีพื้นหลังให้ทึบและใส่เงา)
        for (let item of gridItems) {
            canvasCtx.beginPath();
            canvasCtx.arc(item.x, item.y, item.radius, 0, 2 * Math.PI);
            
            canvasCtx.fillStyle = '#ffffff'; 
            canvasCtx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            canvasCtx.shadowBlur = 10;
            canvasCtx.shadowOffsetX = 2;
            canvasCtx.shadowOffsetY = 4;
            canvasCtx.fill();
            
            canvasCtx.shadowColor = 'transparent';
            canvasCtx.lineWidth = 4;
            canvasCtx.strokeStyle = '#dfe4ea';
            canvasCtx.stroke();
            
            canvasCtx.font = `${item.radius}px Arial`;
            canvasCtx.textAlign = 'center';
            canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(item.text, item.x, item.y);

            // เช็คการชนกันกับปลายนิ้ว (แค่นิ้วเดียว)
            if (activeFinger) {
                let dist = Math.hypot(activeFinger.x - item.x, activeFinger.y - item.y);
                if (dist < item.radius) {
                    currentHover = item;
                }
            }
        }

        // วาดเป้าเล็งที่ปลายนิ้ว
        if (activeFinger) {
            canvasCtx.beginPath();
            canvasCtx.arc(activeFinger.x, activeFinger.y, 15, 0, 2 * Math.PI);
            canvasCtx.fillStyle = 'rgba(255, 71, 87, 0.9)';
            canvasCtx.fill();
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeStyle = '#ffffff';
            canvasCtx.stroke();
        }

        // ระบบการชี้ค้าง (Hover)
        if (currentHover) {
            if (hoverTarget === currentHover) {
                hoverProgress += 3; 
                if (hoverProgress >= 100) {
                    handleSelection(currentHover);
                    hoverProgress = 0;
                    currentHover = null;
                }
            } else {
                hoverTarget = currentHover;
                hoverProgress = 0;
            }

            if (hoverTarget) {
                canvasCtx.beginPath();
                canvasCtx.arc(hoverTarget.x, hoverTarget.y, hoverTarget.radius + 15, -Math.PI / 2, (-Math.PI / 2) + (Math.PI * 2 * (hoverProgress / 100)));
                canvasCtx.lineWidth = 12;
                canvasCtx.strokeStyle = '#1e90ff';
                canvasCtx.stroke();
            }
        } else {
            hoverTarget = null;
            hoverProgress = 0;
        }
    }

    function handleSelection(item) {
        isTransitioning = true;
        if (item.isOdd) {
            score += 10;
            drawFeedback(item.x, item.y, '✅ ถูกต้อง!', '#2ed573');
            setTimeout(() => {
                round++;
                generateLevel();
                isTransitioning = false;
            }, 1000);
        } else {
            lives--;
            drawFeedback(item.x, item.y, '❌ ผิดจ้า!', '#ff4757');
            setTimeout(() => {
                isTransitioning = false;
            }, 1000);
        }
    }

    function drawFeedback(x, y, text, color) {
        canvasCtx.fillStyle = color;
        canvasCtx.font = 'bold 45px Kanit';
        canvasCtx.textAlign = 'center';
        
        canvasCtx.shadowColor = 'rgba(0,0,0,0.8)';
        canvasCtx.shadowBlur = 5;
        canvasCtx.fillText(text, x, y - 60);
        canvasCtx.shadowColor = 'transparent';
    }

    function drawGameUI() {
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        canvasCtx.fillRect(0, 0, canvasElement.width, 60);

        canvasCtx.fillStyle = '#fff';
        canvasCtx.font = 'bold 24px Kanit';
        canvasCtx.textAlign = 'left';
        canvasCtx.textBaseline = 'alphabetic';
        canvasCtx.fillText(`ด่านที่: ${round} | คะแนน: ${score}`, 20, 40);

        canvasCtx.textAlign = 'right';
        let hearts = '❤️'.repeat(Math.max(lives, 0)) + '🖤'.repeat(3 - Math.max(lives, 0));
        canvasCtx.fillText(`พลังชีวิต: ${hearts}`, canvasElement.width - 20, 40);
    }

    function drawGameOver() {
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        
        canvasCtx.fillStyle = '#ff4757';
        canvasCtx.font = 'bold 60px Kanit';
        canvasCtx.textAlign = 'center';
        canvasCtx.fillText('💥 จบเกม!', canvasElement.width / 2, canvasElement.height / 2 - 20);
        
        canvasCtx.fillStyle = '#fff';
        canvasCtx.font = 'bold 30px Kanit';
        canvasCtx.fillText(`คุณทำได้ทั้งหมด ${score} คะแนน`, canvasElement.width / 2, canvasElement.height / 2 + 40);
        
        canvasCtx.fillStyle = '#1e90ff';
        canvasCtx.font = '24px Kanit';
        canvasCtx.fillText('รีเฟรชหน้าเว็บ (F5) เพื่อเริ่มเล่นใหม่', canvasElement.width / 2, canvasElement.height / 2 + 100);
    }
</script>
</body>
</html>
