<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Rehab: ออกกำลังกายปลดล็อกมินิเกม</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 8px;
            overflow: hidden;
        }
        
        .header { text-align: center; margin-bottom: 8px; margin-top: 5px; }
        .header h1 { font-size: 22px; color: #1976d2; margin-bottom: 2px; }
        .header p { font-size: 13px; color: #555; }
        
        /* --- UI ส่วนออกกำลังกาย --- */
        #exerciseUI {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 8px 12px;
            display: none;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        
        select { 
            flex: 1 1 200px; 
            padding: 6px; font-size: 14px; border-radius: 6px; border: 1px solid #ccc;
            font-family: 'Kanit'; outline: none; background: #fff;
        }
        
        .dashboard-box { 
            display: flex; 
            align-items: baseline; 
            gap: 10px;
            background: #e3f2fd; 
            padding: 6px 12px; 
            border-radius: 6px; 
            text-align: center; 
        }
        .value-display { font-size: 24px; font-weight: bold; color: #1976d2; line-height: 1; }
        .target-text { font-size: 14px; color: #555; }
        
        .instruction { 
            flex: 1 1 100%;
            font-size: 13px; font-weight: bold; background: #fff3e0; 
            padding: 4px; border-radius: 6px; text-align: center;
        }

        /* --- กรอบวิดีโอ --- */
        #gameWrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            max-height: calc(100vh - 130px);
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            margin: 0 auto;
        }

        #webcam { display: none; }
        
        #output_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px; font-weight: bold; color: #ff4757;
            text-align: center; background: rgba(255,255,255,0.95);
            padding: 20px 30px; border-radius: 20px; z-index: 50;
        }

        #backBtn {
            position: absolute; top: 10px; left: 10px;
            padding: 6px 12px; font-size: 13px; font-weight: bold; font-family: 'Kanit';
            background: #ff4757; color: white; border: none; border-radius: 20px;
            cursor: pointer; z-index: 5; display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #visibilityWarning {
            position: absolute; top: 10px; right: 10px;
            background: rgba(211, 47, 47, 0.9); color: white;
            padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold;
            display: none; z-index: 15;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="mainTitle">AR ประเมินการฟื้นฟู & มินิเกม</h1>
        <p id="subTitle">ขยับร่างกายให้อยู่ในกล้อง และใช้ "ปลายนิ้วชี้" แตะค้างเพื่อเลือก</p>
    </div>

    <!-- UI ส่วนออกกำลังกาย -->
    <div id="exerciseUI">
        <select id="exerciseSelect">
            <option value="1" data-type="reps" data-target="10" selected>ท่า 1: นั่งเตะขาไปด้านหน้า 10 ครั้ง</option>
            <option value="2" data-type="reps" data-target="10">ท่า 2: ยืนงอเข่าไปด้านหลัง 10 ครั้ง</option>
            <option value="3" data-type="reps" data-target="10">ท่า 3: ยืนกางขาไปด้านข้าง 10 ครั้ง</option>
            <option value="4" data-type="reps" data-target="20">ท่า 4: ยืนเขย่งส้นเท้าขึ้น 20 ครั้ง</option>
            <option value="5" data-type="reps" data-target="20">ท่า 5: ยืนกระดกปลายเท้าขึ้น 20 ครั้ง</option>
            <option value="6" data-type="reps" data-target="10">ท่า 6: ย่อเข่าลงแล้วเหยียดตัวขึ้น 10 ครั้ง</option>
            <option value="10" data-type="time" data-target="10">ท่า 10: ยืนต่อเท้าค้างไว้ 10 วิ</option>
            <option value="12" data-type="time" data-target="10">ท่า 12: ยืนขาเดียวค้างไว้ 10 วิ</option>
            <option value="16" data-type="reps" data-target="10">ท่า 16: นั่งแล้วลุกขึ้นยืน 10 ครั้ง</option>
        </select>
        <div class="dashboard-box">
            <div class="value-display" id="progressValue">0</div>
            <div class="target-text" id="targetValue">เป้าหมาย: 10 ครั้ง</div>
        </div>
        <div class="instruction">
            <span id="instructionText" style="color: #d32f2f;">กำลังรอกล้อง... หรือยังไม่เห็นเป้าหมาย</span>
        </div>
    </div>

    <!-- ส่วนของหน้าจอกล้องและวิดีโอ -->
    <div id="gameWrapper">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas" width="800" height="600"></canvas>
        <button id="backBtn" onclick="goToMenu()">◀ กลับเมนูหลัก</button>
        <div id="visibilityWarning">⚠️ ถอยห่างจากกล้องให้เห็นเท้า/เข่า</div>
        
        <div id="loading">กำลังโหลด AI จับการเคลื่อนไหว...</div>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingScreen = document.getElementById('loading');
    const backBtn = document.getElementById('backBtn');

    const exerciseUI = document.getElementById('exerciseUI');
    const selectBox = document.getElementById('exerciseSelect');
    const progressValue = document.getElementById('progressValue');
    const targetValue = document.getElementById('targetValue');
    const warningElement = document.getElementById('visibilityWarning');
    const instructionText = document.getElementById('instructionText');

    let gameState = 'MENU'; 
    let selectedGame = null;
    let score = 0;
    let round = 1;
    let lives = 3;
    let gridItems = []; 
    let hoverTarget = null; 
    let hoverProgress = 0; 
    let isTransitioning = false; 

    // ตัวแปรเก็บสถานะการออกกำลังกาย
    let currentMode = "reps"; 
    let target = 10;
    let counter = 0;
    let isHoldingPose = false;
    let startTime = 0;
    
    let isDown = false; 
    let leftIsDown = false;
    let rightIsDown = false;
    let lastRepTime = 0;

    function calculateAngle(a, b, c) {
        if (!a || !b || !c) return 180;
        const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
        let angle = Math.abs(radians * 180.0 / Math.PI);
        return angle > 180.0 ? 360 - angle : angle;
    }

    selectBox.addEventListener('change', (e) => {
        const selectedOption = e.target.options[e.target.selectedIndex];
        currentMode = selectedOption.dataset.type;
        target = parseInt(selectedOption.dataset.target);
        
        // รีเซ็ตสถานะทั้งหมดเมื่อเปลี่ยนท่า
        counter = 0; isHoldingPose = false; 
        isDown = false; leftIsDown = false; rightIsDown = false; lastRepTime = 0;
        
        progressValue.innerText = "0";
        targetValue.innerText = `/ ${target} ${currentMode === 'time' ? 'วินาที' : (currentMode === 'steps' ? 'ก้าว' : 'ครั้ง')}`;
    });

    const pairs = [['🍎','🍅'], ['🐶','🐻'], ['☀️','⭐'], ['🚗','🚕'], ['⚽','🏀']];
    const colorOptions = [
        { name: 'แดง', hex: '#ff4757' }, { name: 'เขียว', hex: '#2ed573' },
        { name: 'น้ำเงิน', hex: '#1e90ff' }, { name: 'เหลือง', hex: '#ffa502' }
    ];
    let currentTargetWord = null; let currentTargetColor = null;

    const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbx5ei2W-Wu3r-S7CX0EhSqiTSbwyMSO3l2YQCie5888cZSA9B6ElJgtpUYAG1LjldqMNg/exec'; 

    function goToMenu() {
        gameState = 'MENU';
        backBtn.style.display = 'none';
        exerciseUI.style.display = 'none';
        warningElement.style.display = 'none';
        
        document.querySelector('.header').style.display = 'block'; 
        
        document.getElementById('mainTitle').innerText = 'AR ประเมินการฟื้นฟู & มินิเกม';
        document.getElementById('subTitle').innerText = 'ใช้นิ้วชี้แตะค้างเพื่อเลือกตัวเลือกที่ต้องการ';
        generateMenu();
    }

    function prepareExercise() {
        gameState = 'EXERCISE';
        
        // อัปเดต: รีเซ็ตคะแนนและพลังชีวิต เพื่อป้องกันบัค Game Over เด้งค้าง
        lives = 3; 
        score = 0;

        backBtn.style.display = 'block';
        exerciseUI.style.display = 'flex';
        selectBox.dispatchEvent(new Event('change'));
        
        document.querySelector('.header').style.display = 'none'; 
    }

    function startGame() {
        exerciseUI.style.display = 'none';
        warningElement.style.display = 'none';
        backBtn.style.display = 'block';
        score = 0; round = 1; lives = 3;
        
        if(gameState === 'SPOT') {
            document.getElementById('mainTitle').innerText = '🔍 เกมจับผิดรูปภาพ';
            document.getElementById('subTitle').innerText = 'แตะค้างที่รูปที่ไม่เข้าพวก';
            generateSpotLevel();
        } else if(gameState === 'STROOP') {
            document.getElementById('mainTitle').innerText = '🌈 Stroop Test';
            document.getElementById('subTitle').innerText = 'เลือกคำตอบให้ตรงกับ "สี" ของโจทย์';
            generateStroopLevel();
        }
    }

    function generateMenu() {
        gridItems = [
            { id: 'SPOT', x: 200, y: 300, radius: 80, text: '🔍\nจับผิดรูป' },
            { id: 'STROOP', x: 400, y: 300, radius: 80, text: '🌈\nStroop Test' },
            { id: 'OTAGO', x: 600, y: 300, radius: 80, text: '🏃\nท่า Otago' }
        ];
    }

    function generateSpotLevel() {
        gridItems = [];
        let gridSize = round <= 2 ? 2 : (round <= 5 ? 3 : 4); 
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let oddIndex = Math.floor(Math.random() * (gridSize * gridSize));
        let cellW = canvasElement.width / gridSize; let cellH = canvasElement.height / gridSize;

        for (let row = 0; row < gridSize; row++) {
            for (let col = 0; col < gridSize; col++) {
                let i = row * gridSize + col;
                gridItems.push({
                    x: (col * cellW) + (cellW / 2), y: (row * cellH) + (cellH / 2) + 20,
                    radius: Math.min(cellW, cellH) * 0.35, text: i === oddIndex ? pair[1] : pair[0], isOdd: (i === oddIndex)
                });
            }
        }
    }

    function generateStroopLevel() {
        gridItems = [];
        currentTargetWord = colorOptions[Math.floor(Math.random() * colorOptions.length)];
        currentTargetColor = colorOptions[Math.floor(Math.random() * colorOptions.length)];
        let shuffledColors = [...colorOptions].sort(() => Math.random() - 0.5);
        let positions = [ { x: 250, y: 360 }, { x: 550, y: 360 }, { x: 250, y: 500 }, { x: 550, y: 500 } ];

        for (let i = 0; i < 4; i++) {
            gridItems.push({
                x: positions[i].x, y: positions[i].y, radius: 60,
                colorData: shuffledColors[i], isCorrect: (shuffledColors[i].hex === currentTargetColor.hex)
            });
        }
    }

    const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
    holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    holistic.onResults(onResults);

    const camera = new Camera(videoElement, { onFrame: async () => { await holistic.send({image: videoElement}); }, width: 800, height: 600 });
    camera.start();

    function incrementRep() {
        const now = Date.now();
        if (now - lastRepTime > 800) { 
            if (counter < target) {
                counter++;
                progressValue.innerText = counter;
                checkExerciseComplete();
            }
            lastRepTime = now;
        }
    }

    function onResults(results) {
        if(loadingScreen.style.display !== 'none') {
            loadingScreen.style.display = 'none'; goToMenu(); 
        }

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.scale(-1, 1); canvasCtx.translate(-canvasElement.width, 0);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (results.poseLandmarks) {
            drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#44bd32', lineWidth: 4}); 
            drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#fbc531', lineWidth: 2, radius: 3}); 
        }
        if (results.rightHandLandmarks) drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#00CCFF', lineWidth: 3});
        if (results.leftHandLandmarks) drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#00CCFF', lineWidth: 3});
        
        if (gameState === 'EXERCISE' && results.poseLandmarks && !isTransitioning) {
            const leftHip = results.poseLandmarks[23]; const rightHip = results.poseLandmarks[24];
            const leftKnee = results.poseLandmarks[25]; const rightKnee = results.poseLandmarks[26];
            const leftAnkle = results.poseLandmarks[27]; const rightAnkle = results.poseLandmarks[28];
            const leftHeel = results.poseLandmarks[29]; const rightHeel = results.poseLandmarks[30];
            const leftToe = results.poseLandmarks[31]; const rightToe = results.poseLandmarks[32];
            
            const exerciseVal = selectBox.value;
            let isBodyVisible = false;

            const hasLeftLeg = leftHip && leftKnee && leftAnkle && leftKnee.visibility > 0.4;
            const hasRightLeg = rightHip && rightKnee && rightAnkle && rightKnee.visibility > 0.4;
            
            if (hasLeftLeg || hasRightLeg) isBodyVisible = true;

            if (!isBodyVisible) {
                warningElement.style.display = "block";
                instructionText.innerText = "กำลังรอกล้อง... ถอยห่างให้เห็นข้อเท้า/เข่าอย่างน้อย 1 ข้าง";
                instructionText.style.color = "#d32f2f";
            } else {
                warningElement.style.display = "none";
                instructionText.innerText = "เยี่ยมมาก! ขยับร่างกายตามท่าได้เลย (แนะนำตั้งกล้องเฉียง 45 องศา)";
                instructionText.style.color = "#2e7d32";
                
                const leftKneeAngle = hasLeftLeg ? calculateAngle(leftHip, leftKnee, leftAnkle) : 180;
                const rightKneeAngle = hasRightLeg ? calculateAngle(rightHip, rightKnee, rightAnkle) : 180;

                if (currentMode === "reps") {
                    if (exerciseVal === "1") {
                        if (hasLeftLeg) {
                            if (leftKneeAngle < 130) leftIsDown = true; 
                            if (leftIsDown && leftKneeAngle > 150) { leftIsDown = false; incrementRep(); }
                        }
                        if (hasRightLeg) {
                            if (rightKneeAngle < 130) rightIsDown = true; 
                            if (rightIsDown && rightKneeAngle > 150) { rightIsDown = false; incrementRep(); }
                        }
                    }
                    else if (exerciseVal === "2") {
                        if (hasLeftLeg) {
                            if (leftKneeAngle > 160) leftIsDown = true; 
                            if (leftIsDown && leftKneeAngle < 130) { leftIsDown = false; incrementRep(); }
                        }
                        if (hasRightLeg) {
                            if (rightKneeAngle > 160) rightIsDown = true; 
                            if (rightIsDown && rightKneeAngle < 130) { rightIsDown = false; incrementRep(); }
                        }
                    }
                    else if (exerciseVal === "3") {
                        if (leftAnkle && rightAnkle) {
                            const dist = Math.abs(leftAnkle.x - rightAnkle.x);
                            if (dist < 0.12) isDown = true; 
                            if (isDown && dist > 0.18) { 
                                 isDown = false; incrementRep();
                            }
                        }
                    }
                    else if (exerciseVal === "4") {
                        if (leftHeel && leftToe && rightHeel && rightToe) {
                            const leftDiff = leftToe.y - leftHeel.y;
                            const rightDiff = rightToe.y - rightHeel.y;
                            if (leftDiff < 0.02 && rightDiff < 0.02) isDown = true; 
                            if (isDown && (leftDiff > 0.06 || rightDiff > 0.06)) { 
                                 isDown = false; incrementRep();
                            }
                        }
                    }
                    else if (exerciseVal === "5") {
                        if (leftHeel && leftToe && rightHeel && rightToe) {
                            const leftDiff = leftHeel.y - leftToe.y;
                            const rightDiff = rightHeel.y - rightToe.y;
                            if (leftDiff < 0.02 && rightDiff < 0.02) isDown = true; 
                            if (isDown && (leftDiff > 0.05 || rightDiff > 0.05)) { 
                                 isDown = false; incrementRep();
                            }
                        }
                    }
                    else if (exerciseVal === "6") {
                        const avgKneeAngle = (leftKneeAngle + rightKneeAngle) / 2;
                        if (avgKneeAngle > 160) isDown = true; 
                        if (isDown && avgKneeAngle < 140) { 
                             isDown = false; incrementRep();
                        }
                    }
                    else if (exerciseVal === "16") {
                        const avgKneeAngle = (leftKneeAngle + rightKneeAngle) / 2;
                        if (avgKneeAngle < 120) isDown = true; 
                        if (isDown && avgKneeAngle > 160) { 
                             isDown = false; incrementRep();
                        }
                    }
                } 
                else if (currentMode === "time") {
                    if (exerciseVal === "10") {
                        if (leftAnkle && rightAnkle) {
                            const xDist = Math.abs(leftAnkle.x - rightAnkle.x);
                            if (xDist < 0.08) { 
                                if (!isHoldingPose) { isHoldingPose = true; startTime = Date.now(); } 
                            } else { isHoldingPose = false; }
                        }
                    }
                    else if (exerciseVal === "12") {
                        if (leftAnkle && rightAnkle) {
                            const heightDiff = Math.abs(leftAnkle.y - rightAnkle.y);
                            if (heightDiff > 0.08) { 
                                if (!isHoldingPose) { isHoldingPose = true; startTime = Date.now(); } 
                            } else { isHoldingPose = false; }
                        }
                    }

                    if (isHoldingPose) {
                        let elapsed = Math.floor((Date.now() - startTime) / 1000);
                        if (elapsed <= target) {
                            counter = elapsed; progressValue.innerText = counter;
                            if(counter >= target) checkExerciseComplete();
                        }
                    }
                }
            }
        }
        
        canvasCtx.restore(); 

        // ==========================================
        // อัปเดต: ให้การจบเกมทำงานเฉพาะในโหมดมินิเกมเท่านั้น ป้องกันบัคหน้าจอจบเกมเด้งข้ามโหมด
        if (lives <= 0 && (gameState === 'SPOT' || gameState === 'STROOP')) {
            gameState = 'GAMEOVER';
            saveScoreToGoogleSheet(score);
            setTimeout(() => { goToMenu(); }, 3000);
        }

        if (gameState === 'GAMEOVER') {
            drawGameOverScreen();
            return;
        }

        // ==========================================
        if (gameState !== 'EXERCISE') {
            let activeFinger = null;
            const getMirroredCoords = (landmark) => ({ x: (1 - landmark.x) * canvasElement.width, y: landmark.y * canvasElement.height });

            if (results.rightHandLandmarks) activeFinger = getMirroredCoords(results.rightHandLandmarks[8]); 
            else if (results.leftHandLandmarks) activeFinger = getMirroredCoords(results.leftHandLandmarks[8]); 
            else if (results.poseLandmarks) {
                if (results.poseLandmarks[20].visibility > 0.5) activeFinger = getMirroredCoords(results.poseLandmarks[20]);
                else if (results.poseLandmarks[19].visibility > 0.5) activeFinger = getMirroredCoords(results.poseLandmarks[19]);
            }

            if (gameState !== 'MENU') drawGameUI();
            if (gameState === 'STROOP' && !isTransitioning) drawStroopQuestion();
            if (isTransitioning) return;

            let currentHover = null;
            for (let item of gridItems) {
                drawItem(item);
                if (activeFinger && Math.hypot(activeFinger.x - item.x, activeFinger.y - item.y) < item.radius) {
                    currentHover = item;
                }
            }

            if (activeFinger) {
                canvasCtx.beginPath(); canvasCtx.arc(activeFinger.x, activeFinger.y, 15, 0, 2 * Math.PI);
                canvasCtx.fillStyle = 'rgba(255, 71, 87, 0.9)'; canvasCtx.fill();
                canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = '#ffffff'; canvasCtx.stroke();
            }

            if (currentHover) {
                if (hoverTarget === currentHover) {
                    hoverProgress += 3; 
                    if (hoverProgress >= 100) { handleSelection(currentHover); hoverProgress = 0; currentHover = null; }
                } else { hoverTarget = currentHover; hoverProgress = 0; }

                if (hoverTarget) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(hoverTarget.x, hoverTarget.y, hoverTarget.radius + 15, -Math.PI / 2, (-Math.PI / 2) + (Math.PI * 2 * (hoverProgress / 100)));
                    canvasCtx.lineWidth = 10; canvasCtx.strokeStyle = '#1e90ff'; canvasCtx.stroke();
                }
            } else { hoverTarget = null; hoverProgress = 0; }
        }
    }

    function checkExerciseComplete() {
        if (counter >= target) {
            isTransitioning = true;
            instructionText.innerText = "🎉 สำเร็จ! ทำกายภาพครบแล้ว กลับสู่เมนูหลัก...";
            instructionText.style.color = "#1e90ff";
            setTimeout(() => {
                isTransitioning = false;
                goToMenu(); 
            }, 2000);
        }
    }

    function drawItem(item) {
        canvasCtx.beginPath(); canvasCtx.arc(item.x, item.y, item.radius, 0, 2 * Math.PI);
        canvasCtx.fillStyle = '#ffffff'; 
        canvasCtx.shadowColor = 'rgba(0,0,0,0.4)'; canvasCtx.shadowBlur = 10; canvasCtx.shadowOffsetX = 2; canvasCtx.shadowOffsetY = 4;
        canvasCtx.fill();
        canvasCtx.shadowColor = 'transparent'; canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = '#dfe4ea'; canvasCtx.stroke();

        if (gameState === 'MENU') {
            let lines = item.text.split('\n');
            canvasCtx.fillStyle = '#2f3542'; canvasCtx.textAlign = 'center'; canvasCtx.textBaseline = 'middle';
            canvasCtx.font = '36px Arial'; canvasCtx.fillText(lines[0], item.x, item.y - 15);
            canvasCtx.font = 'bold 20px Kanit'; canvasCtx.fillText(lines[1], item.x, item.y + 25);
        } else if (gameState === 'SPOT') {
            canvasCtx.font = `${item.radius}px Arial`; canvasCtx.textAlign = 'center'; canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(item.text, item.x, item.y);
        } else if (gameState === 'STROOP') {
            canvasCtx.fillStyle = '#2f3542';
            canvasCtx.font = 'bold 28px Kanit'; canvasCtx.textAlign = 'center'; canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(item.colorData.name, item.x, item.y);
        }
    }

    function drawStroopQuestion() {
        canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.9)'; canvasCtx.fillRect(200, 90, 400, 120);
        canvasCtx.lineWidth = 4; canvasCtx.strokeStyle = '#2f3542'; canvasCtx.strokeRect(200, 90, 400, 120);
        canvasCtx.fillStyle = '#2f3542'; canvasCtx.font = 'bold 20px Kanit'; canvasCtx.textAlign = 'center';
        canvasCtx.fillText('เลือกคำตอบให้ตรงกับ "สี" ของตัวอักษรนี้', canvasElement.width / 2, 120);
        
        canvasCtx.fillStyle = currentTargetColor.hex; 
        canvasCtx.font = 'bold 60px Kanit';
        canvasCtx.lineWidth = 2; canvasCtx.strokeStyle = '#000000';
        canvasCtx.strokeText(currentTargetWord.name, canvasElement.width / 2, 180);
        canvasCtx.fillText(currentTargetWord.name, canvasElement.width / 2, 180);
    }

    function handleSelection(item) {
        if (gameState === 'MENU') {
            if (item.id === 'OTAGO') {
                prepareExercise();
            } else {
                gameState = item.id;
                selectedGame = item.id;
                startGame();
            }
            return;
        }

        isTransitioning = true;
        let isCorrect = (gameState === 'SPOT') ? item.isOdd : item.isCorrect;

        if (isCorrect) {
            score += 10;
            drawFeedback(canvasElement.width/2, 300, '✨ ถูกต้อง!', '#2ed573');
            setTimeout(() => { round++; (gameState === 'SPOT') ? generateSpotLevel() : generateStroopLevel(); isTransitioning = false; }, 1000);
        } else {
            lives--;
            drawFeedback(canvasElement.width/2, 300, '❌ ผิดจ้า!', '#ff4757');
            setTimeout(() => { isTransitioning = false; }, 1000);
        }
    }

    function drawFeedback(x, y, text, color) {
        canvasCtx.fillStyle = color; canvasCtx.font = 'bold 60px Kanit'; canvasCtx.textAlign = 'center';
        canvasCtx.shadowColor = 'rgba(0,0,0,0.8)'; canvasCtx.shadowBlur = 8;
        canvasCtx.fillText(text, x, y); canvasCtx.shadowColor = 'transparent';
    }

    function drawGameUI() {
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.7)'; canvasCtx.fillRect(0, 0, canvasElement.width, 60);
        canvasCtx.fillStyle = '#fff'; canvasCtx.font = 'bold 24px Kanit'; canvasCtx.textAlign = 'left'; canvasCtx.textBaseline = 'alphabetic';
        canvasCtx.fillText(`ด่าน: ${round} | แต้ม: ${score}`, 160, 40);
        canvasCtx.textAlign = 'right';
        let hearts = '❤️'.repeat(Math.max(lives, 0)) + '🖤'.repeat(3 - Math.max(lives, 0));
        canvasCtx.fillText(`พลังชีวิต: ${hearts}`, canvasElement.width - 20, 40);
    }

    function saveScoreToGoogleSheet(newScore) {
        const data = { game: selectedGame, score: newScore };
        fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(data)
        }).then(() => console.log("✅ สั่งส่งข้อมูลไปยัง Google Sheet เรียบร้อยแล้ว!"))
          .catch(error => console.error("❌ เกิดข้อผิดพลาด:", error));
    }

    function drawGameOverScreen() {
        canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.85)'; canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.fillStyle = '#ff4757'; canvasCtx.font = 'bold 60px Kanit'; canvasCtx.textAlign = 'center';
        canvasCtx.fillText('💥 จบเกม!', canvasElement.width / 2, canvasElement.height / 2 - 20);
        canvasCtx.fillStyle = '#fff'; canvasCtx.font = 'bold 30px Kanit';
        canvasCtx.fillText(`คุณทำได้ทั้งหมด ${score} คะแนน`, canvasElement.width / 2, canvasElement.height / 2 + 40);
    }
</script>
</body>
</html>
